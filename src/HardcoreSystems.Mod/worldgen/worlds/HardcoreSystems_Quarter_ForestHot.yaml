name: Hardcore ForestHot Quarter
description: Hardcore Systems Quarter asteroid-size variant generated from ForestHot.
disableWorldTraits: true
asteroidIcon: Asteroid_hotforest

worldTraitScale: 0.25 # Hardcore Systems v0.7 area-scaled
worldsize:
  X: 128
  Y: 192
layoutMethod: PowerTree # Note: We need to add weights to the items in the layer

defaultsOverrides:
  startingWorldElements: [] # remove the algae check
  data:
    DrawWorldBorder: true
    DrawWorldBorderForce: false
    WorldBorderThickness: 3
    WorldBorderRange: 1
    OverworldDensityMin: 6
    OverworldDensityMax: 10
    OverworldAvoidRadius: 2
    OverworldSampleBehaviour: PoissonDisk
    OverworldMinNodes: 1
    OverworldMaxNodes: 800
    poiPadding: 1
#                                in order to use this.

subworldFiles:
  - name: subworlds/forest/HardcoreSystems_Quarter_ForestStartHot
  - name: subworlds/forest/HardcoreSystems_Quarter_ForestMiniWaterHot
    weight: 0.5
  - name: subworlds/forest/HardcoreSystems_Quarter_ForestMiniOxyHot
  - name: subworlds/forest/HardcoreSystems_Quarter_ForestMiniMetalHot
  - name: subworlds/forest/HardcoreSystems_Quarter_ForestHot
  - name: subworlds/marsh/HardcoreSystems_Quarter_HotMarsh
  - name: subworlds/jungle/HardcoreSystems_Quarter_Jungle
  - name: subworlds/ocean/HardcoreSystems_Quarter_OceanHot
  - name: subworlds/rust/HardcoreSystems_Quarter_RustWarm
  - name: subworlds/magma/HardcoreSystems_Quarter_Bottom
  - name: subworlds/oil/HardcoreSystems_Quarter_OilPockets
  - name: subworlds/space/HardcoreSystems_Quarter_Space
  - name: subworlds/space/HardcoreSystems_Quarter_Surface

startSubworldName: subworlds/forest/HardcoreSystems_Quarter_ForestStartHot
startingBaseTemplate: bases/forestBase
startingBasePositionHorizontal:
  min: 0.4
  max: 0.5
startingBasePositionVertical:
  min: 0.45
  max: 0.55

seasons:
  - MeteorShowers


unknownCellsAllowedSubworlds:
  # Hardcore Systems Quarter compact fill. Keep every biome pocket small and mixed.
  - tagcommand: Default
    command: Replace
    subworldNames:
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniWaterHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniOxyHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniMetalHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestHot
      - subworlds/marsh/HardcoreSystems_Quarter_HotMarsh
      - subworlds/jungle/HardcoreSystems_Quarter_Jungle
      - subworlds/ocean/HardcoreSystems_Quarter_OceanHot
      - subworlds/rust/HardcoreSystems_Quarter_RustWarm
      - subworlds/oil/HardcoreSystems_Quarter_OilPockets
  # Compact ring around the printing pod.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniWaterHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniOxyHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniMetalHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestHot
  # Keep at least water-capable biomes available near the start without reserving a huge region.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 2
    command: UnionWith
    subworldNames:
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniWaterHot
      - subworlds/ocean/HardcoreSystems_Quarter_OceanHot
  # Mix all non-surface/non-magma biomes after the starter pocket.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 2
    maxDistance: 99
    command: UnionWith
    subworldNames:
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniWaterHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniOxyHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestMiniMetalHot
      - subworlds/forest/HardcoreSystems_Quarter_ForestHot
      - subworlds/marsh/HardcoreSystems_Quarter_HotMarsh
      - subworlds/jungle/HardcoreSystems_Quarter_Jungle
      - subworlds/ocean/HardcoreSystems_Quarter_OceanHot
      - subworlds/rust/HardcoreSystems_Quarter_RustWarm
      - subworlds/oil/HardcoreSystems_Quarter_OilPockets
  # Quarter keeps lava/core content to the bottom band only.
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 0
    maxDistance: 0
    command: Replace
    subworldNames:
      - subworlds/magma/HardcoreSystems_Quarter_Bottom
  # Quarter pins actual space to the surface tag so the top opens above the asteroid.
  - tagcommand: AtTag
    tag: AtSurface
    command: Replace
    subworldNames:
      - subworlds/space/HardcoreSystems_Quarter_Space
  # Quarter keeps regolith/surface crust directly below space instead of letting it consume side biomes.
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/space/HardcoreSystems_Quarter_Surface

worldTemplateRules:
  # Several optional water-focused geyser/vent attempts for Quarter. TryOne avoids hard generation failures on tight maps.
  - names:
      - geysers/steam
      - geysers/salt_water
      - geysers/filthy_water
      - poi/poi_ocean_geyser_saltwater
      - poi/jungle/geyser_steam
      - poi/hotmarsh/geyser_steam
    listRule: TryOne
    times: 3
    priority: 25
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 1
        maxDistance: 99
      - command: ExceptWith
        zoneTypes: [ Space, MagmaCore ]
  # Extra optional vents/volcanoes keep Quarter closer to Spaced Out resource density without guaranteed placement.
  - names:
      - geysers/chlorine_gas
      - geysers/hot_po2
      - geysers/methane
      - geysers/hot_hydrogen
      - geysers/liquid_co2
      - geysers/slush_water
      - geysers/small_volcano
      - geysers/big_volcano
    listRule: TryOne
    times: 3
    priority: 24
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 2
        maxDistance: 99
      - command: ExceptWith
        zoneTypes: [ Space, MagmaCore ]
