name: Hardcore VanillaSandstoneFrozen Quarter
description: Hardcore Systems Quarter asteroid-size variant generated from VanillaSandstoneFrozen.
disableWorldTraits: true
nameTables: [ TUNDRA ]
asteroidIcon: asteroid_vanilla_sandstonefrozen_kanim

worldTraitScale: 0.225 # Hardcore Systems v0.7 area-scaled
worldsize:
  X: 120
  Y: 190
layoutMethod: PowerTree # Note: We need to add weights to the items in the layer

defaultsOverrides:
  data:
    DrawWorldBorder: true
    DrawWorldBorderForce: false
    WorldBorderThickness: 5
    WorldBorderRange: 1
    OverworldDensityMin: 80
    OverworldDensityMax: 90
    OverworldAvoidRadius: 2
    OverworldSampleBehaviour: PoissonDisk
    OverworldMinNodes: 24
    OverworldMaxNodes: 800
    poiPadding: 1
#                                in order to use this.

fixedTraits:
  - sunlightMed
  - cosmicRadiationVeryLow

seasons:
  - ClassicStyleStartMeteorShowers
  - VanillaSandstoneFrozenMeteorShowers # unused

startSubworldName: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneStartCold
startingBaseTemplate: bases/sandstoneBase
startingBasePositionHorizontal:
  min: 0.4
  max: 0.5
startingBasePositionVertical:
  min: 0.45
  max: 0.55

subworldFiles:
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneStartCold
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetalCold
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWaterCold
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniAlgaeCold
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneFrozen
  - name: subworlds/marsh/HardcoreSystems_Quarter_HotMarshSlush
  - name: subworlds/jungle/HardcoreSystems_Quarter_JungleFrozen
  - name: subworlds/frozen/HardcoreSystems_Quarter_CO2Lakes
  - name: subworlds/magma/HardcoreSystems_Quarter_Bottom
  - name: subworlds/magma/HardcoreSystems_Quarter_VolcanoHole
  - name: subworlds/magma/HardcoreSystems_Quarter_SolidMagma
  - name: subworlds/oil/HardcoreSystems_Quarter_OilPocketsFrozen
  - name: expansion1::subworlds/space/HardcoreSystems_Quarter_SpaceWithNoBorder
  - name: expansion1::subworlds/space/HardcoreSystems_Quarter_HospitableClassicSurface
  - name: subworlds/ocean/HardcoreSystems_Quarter_OceanSlush
  - name: subworlds/ocean/HardcoreSystems_Quarter_OceanFrozen
  - name: subworlds/rust/HardcoreSystems_Quarter_RustFrozen
  - name: subworlds/forest/HardcoreSystems_Quarter_ForestFrozen
  # Spaced Out biome
  - name: expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_Radioactive
    weight: 0.5
  - name: expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_UraniumFields
    weight: 0.25
  - name: expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_FrozenUraniumFields
    weight: 0.25

# Specify where subworlds can spawn. These rules are processed in order and their effects are cumulative.

unknownCellsAllowedSubworlds:
  # Hardcore Systems Quarter compact fill. Keep every biome pocket small and mixed.
  - tagcommand: Default
    command: Replace
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetalCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWaterCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniAlgaeCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneFrozen
      - subworlds/marsh/HardcoreSystems_Quarter_HotMarshSlush
      - subworlds/jungle/HardcoreSystems_Quarter_JungleFrozen
      - subworlds/frozen/HardcoreSystems_Quarter_CO2Lakes
      - subworlds/oil/HardcoreSystems_Quarter_OilPocketsFrozen
      - subworlds/ocean/HardcoreSystems_Quarter_OceanSlush
      - subworlds/ocean/HardcoreSystems_Quarter_OceanFrozen
      - subworlds/rust/HardcoreSystems_Quarter_RustFrozen
      - subworlds/forest/HardcoreSystems_Quarter_ForestFrozen
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_Radioactive
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_UraniumFields
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_FrozenUraniumFields
  # Compact ring around the printing pod.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetalCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWaterCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniAlgaeCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneFrozen
      - subworlds/jungle/HardcoreSystems_Quarter_JungleFrozen
      - subworlds/frozen/HardcoreSystems_Quarter_CO2Lakes
      - subworlds/oil/HardcoreSystems_Quarter_OilPocketsFrozen
      - subworlds/ocean/HardcoreSystems_Quarter_OceanFrozen
      - subworlds/rust/HardcoreSystems_Quarter_RustFrozen
      - subworlds/forest/HardcoreSystems_Quarter_ForestFrozen
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_FrozenUraniumFields
  # Keep at least water-capable biomes available near the start without reserving a huge region.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 2
    command: UnionWith
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWaterCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneFrozen
      - subworlds/marsh/HardcoreSystems_Quarter_HotMarshSlush
      - subworlds/jungle/HardcoreSystems_Quarter_JungleFrozen
      - subworlds/frozen/HardcoreSystems_Quarter_CO2Lakes
      - subworlds/oil/HardcoreSystems_Quarter_OilPocketsFrozen
      - subworlds/ocean/HardcoreSystems_Quarter_OceanSlush
      - subworlds/ocean/HardcoreSystems_Quarter_OceanFrozen
      - subworlds/rust/HardcoreSystems_Quarter_RustFrozen
      - subworlds/forest/HardcoreSystems_Quarter_ForestFrozen
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_FrozenUraniumFields
  # Mix all non-surface/non-magma biomes after the starter pocket.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 2
    maxDistance: 99
    command: UnionWith
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetalCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWaterCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniAlgaeCold
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneFrozen
      - subworlds/marsh/HardcoreSystems_Quarter_HotMarshSlush
      - subworlds/jungle/HardcoreSystems_Quarter_JungleFrozen
      - subworlds/frozen/HardcoreSystems_Quarter_CO2Lakes
      - subworlds/oil/HardcoreSystems_Quarter_OilPocketsFrozen
      - subworlds/ocean/HardcoreSystems_Quarter_OceanSlush
      - subworlds/ocean/HardcoreSystems_Quarter_OceanFrozen
      - subworlds/rust/HardcoreSystems_Quarter_RustFrozen
      - subworlds/forest/HardcoreSystems_Quarter_ForestFrozen
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_Radioactive
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_UraniumFields
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_med_FrozenUraniumFields
  # Quarter keeps lava/core content to the bottom band only.
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 0
    maxDistance: 0
    command: Replace
    subworldNames:
      - subworlds/magma/HardcoreSystems_Quarter_Bottom
      - subworlds/magma/HardcoreSystems_Quarter_VolcanoHole
      - subworlds/magma/HardcoreSystems_Quarter_SolidMagma
  # Quarter keeps space/regolith content to the surface band only.
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 0
    maxDistance: 0
    command: Replace
    subworldNames:
      - expansion1::subworlds/space/HardcoreSystems_Quarter_SpaceWithNoBorder
      - expansion1::subworlds/space/HardcoreSystems_Quarter_HospitableClassicSurface

worldTemplateRules:
  # One optional water-focused geyser/vent for Quarter. TryOne avoids hard generation failures on tight maps.
  - names:
      - geysers/steam
      - geysers/salt_water
      - geysers/filthy_water
      - poi/poi_ocean_geyser_saltwater
      - poi/jungle/geyser_steam
      - poi/hotmarsh/geyser_steam
      - expansion1::geysers/slush_salt_water
    listRule: TryOne
    priority: 25
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 1
        maxDistance: 99
      - command: ExceptWith
        zoneTypes: [ Space, MagmaCore ]
