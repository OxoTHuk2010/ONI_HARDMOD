name: Hardcore VanillaBadlands Quarter
description: Hardcore Systems Quarter asteroid-size variant generated from VanillaBadlands.
disableWorldTraits: true
nameTables: [ TERRA ]
asteroidIcon: asteroid_vanilla_badlands_kanim

worldTraitScale: 0.225 # Hardcore Systems v0.7 area-scaled
worldsize:
  X: 120
  Y: 190
layoutMethod: PowerTree

defaultsOverrides:
  data:
    DrawWorldBorder: true
    DrawWorldBorderForce: false
    WorldBorderThickness: 5
    WorldBorderRange: 1
    OverworldDensityMin: 80
    OverworldDensityMax: 90
    OverworldAvoidRadius: 2
    OverworldSampleBehaviour: PoissonDisk
    OverworldMinNodes: 24
    OverworldMaxNodes: 800
    poiPadding: 1

# Notes:
# minCounts are just enough space to generate guaranteed templates as this is a difficult world

# List all the subworld files to load
subworldFiles:
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneStart
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetal
  - name: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWater
  - name: subworlds/jungle/HardcoreSystems_Quarter_Jungle
  - name: subworlds/frozen/HardcoreSystems_Quarter_Frozen
  - name: subworlds/magma/HardcoreSystems_Quarter_Bottom
  - name: subworlds/oil/HardcoreSystems_Quarter_OilPockets
  - name: expansion1::subworlds/space/HardcoreSystems_Quarter_SpaceWithNoBorder
  - name: expansion1::subworlds/space/HardcoreSystems_Quarter_HospitableClassicSurface
  - name: subworlds/rust/HardcoreSystems_Quarter_Rust
  - name: subworlds/barren/HardcoreSystems_Quarter_BarrenGranite
  # Spaced Out biomes
  - name: expansion1::subworlds/wasteland/HardcoreSystems_Quarter_WastelandBeetle
  - name: expansion1::subworlds/wasteland/HardcoreSystems_Quarter_WastelandWorm
  - name: expansion1::subworlds/radioactive/HardcoreSystems_Quarter_UraniumSprinkles

startSubworldName: subworlds/sandstone/HardcoreSystems_Quarter_SandstoneStart
startingBaseTemplate: bases/sandstoneBase
startingBasePositionHorizontal:
  min: 0.4
  max: 0.5
startingBasePositionVertical:
  min: 0.40
  max: 0.55

fixedTraits:
  - sunlightMed
  - cosmicRadiationVeryLow

seasons:
  - ClassicStyleStartMeteorShowers
  - VanillaBadlandsMeteorShowers # unused

# Specify where subworlds can spawn. These rules are processed in order and their effects are cumulative.

unknownCellsAllowedSubworlds:
  # Hardcore Systems Quarter compact fill. Keep every biome pocket small and mixed.
  - tagcommand: Default
    command: Replace
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetal
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWater
      - subworlds/jungle/HardcoreSystems_Quarter_Jungle
      - subworlds/frozen/HardcoreSystems_Quarter_Frozen
      - subworlds/oil/HardcoreSystems_Quarter_OilPockets
      - subworlds/rust/HardcoreSystems_Quarter_Rust
      - subworlds/barren/HardcoreSystems_Quarter_BarrenGranite
      - expansion1::subworlds/wasteland/HardcoreSystems_Quarter_WastelandBeetle
      - expansion1::subworlds/wasteland/HardcoreSystems_Quarter_WastelandWorm
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_UraniumSprinkles
  # Compact ring around the printing pod.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetal
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWater
      - subworlds/frozen/HardcoreSystems_Quarter_Frozen
      - subworlds/barren/HardcoreSystems_Quarter_BarrenGranite
  # Keep at least water-capable biomes available near the start without reserving a huge region.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 2
    command: UnionWith
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWater
      - subworlds/frozen/HardcoreSystems_Quarter_Frozen
  # Mix all non-surface/non-magma biomes after the starter pocket.
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 2
    maxDistance: 99
    command: UnionWith
    subworldNames:
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniMetal
      - subworlds/sandstone/HardcoreSystems_Quarter_SandstoneMiniWater
      - subworlds/jungle/HardcoreSystems_Quarter_Jungle
      - subworlds/frozen/HardcoreSystems_Quarter_Frozen
      - subworlds/oil/HardcoreSystems_Quarter_OilPockets
      - subworlds/rust/HardcoreSystems_Quarter_Rust
      - subworlds/barren/HardcoreSystems_Quarter_BarrenGranite
      - expansion1::subworlds/wasteland/HardcoreSystems_Quarter_WastelandBeetle
      - expansion1::subworlds/wasteland/HardcoreSystems_Quarter_WastelandWorm
      - expansion1::subworlds/radioactive/HardcoreSystems_Quarter_UraniumSprinkles
  # Quarter keeps lava/core content to the bottom band only.
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 0
    maxDistance: 0
    command: Replace
    subworldNames:
      - subworlds/magma/HardcoreSystems_Quarter_Bottom
  # Quarter keeps space/regolith content to the surface band only.
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 0
    maxDistance: 0
    command: Replace
    subworldNames:
      - expansion1::subworlds/space/HardcoreSystems_Quarter_SpaceWithNoBorder
      - expansion1::subworlds/space/HardcoreSystems_Quarter_HospitableClassicSurface

worldTemplateRules:
  # One optional water-focused geyser/vent for Quarter. TryOne avoids hard generation failures on tight maps.
  - names:
      - geysers/steam
      - geysers/salt_water
      - geysers/filthy_water
      - poi/poi_ocean_geyser_saltwater
      - poi/jungle/geyser_steam
      - poi/hotmarsh/geyser_steam
      - expansion1::geysers/slush_salt_water
    listRule: TryOne
    priority: 25
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 1
        maxDistance: 99
      - command: ExceptWith
        zoneTypes: [ Space, MagmaCore ]
